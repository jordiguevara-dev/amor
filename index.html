<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo para ti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="acceso.css">
</head>
<body>
    <div class="roses-overlay"></div>
    <div class="glass-card text-center shadow-lg">
        <div class="lock-icon">🔒</div>
        <h2 class="text-white fw-bold mb-4">Nuestro Código</h2>
        <div class="d-flex justify-content-center gap-2 mb-4">
            <div class="digit-box"><button onclick="change(0,1)">▲</button><span id="d0">0</span><button onclick="change(0,-1)">▼</button></div>
            <div class="digit-box"><button onclick="change(1,1)">▲</button><span id="d1">0</span><button onclick="change(1,-1)">▼</button></div>
            <div class="digit-box"><button onclick="change(2,1)">▲</button><span id="d2">0</span><button onclick="change(2,-1)">▼</button></div>
            <div class="digit-box"><button onclick="change(3,1)">▲</button><span id="d3">0</span><button onclick="change(3,-1)">▼</button></div>
        </div>
        <button class="unlock-btn" onclick="unlock()">DESBLOQUEAR</button>
    </div>
    <script src="acceso.js"></script>
</body>
</html>
